<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petanque Skytteträning</title>
    
    <!-- Mobiloptimerings-taggar -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Petanque">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#111827">

    <style>
        :root {
            --color-miss: #ef4444; /* Röd */
            --color-traff: #facc15; /* Gul */
            --color-stann: #22c55e; /* Grön */
            --bg-dark: #111827;
            --card-bg: #1f2937;
            --text-light: #f3f4f6;
            --accent: #6366f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overscroll-behavior-y: contain;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding-bottom: env(safe-area-inset-bottom);
        }

        header {
            margin-bottom: 1.5rem;
            margin-top: env(safe-area-inset-top);
        }

        h1 { margin: 0; font-size: 1rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; }
        
        .selector-label {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 1rem;
            display: block;
            text-transform: uppercase;
        }

        .selector-group {
            margin: 0.5rem 0 1rem 0;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .option-btn {
            background: #374151;
            color: white;
            border: 2px solid transparent;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn.active {
            border-color: var(--accent);
            background: var(--accent);
        }

        .current-distance { font-size: 3.5rem; font-weight: 800; margin: 0.2rem 0; color: white; }
        
        .progress-container {
            background: #374151;
            border-radius: 999px;
            height: 12px;
            width: 100%;
            margin-bottom: 0.8rem;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .counter {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: #d1d5db;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .btn {
            border: none;
            border-radius: 1rem;
            padding: 1.8rem 1rem;
            font-size: 1.7rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .btn-miss { background-color: var(--color-miss); }
        .btn-traff { background-color: var(--color-traff); color: #111; }
        .btn-stann { background-color: var(--color-stann); }

        .control-panel {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
        }

        .reset-link {
            color: #9ca3af;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.9rem;
            background: none;
            border: none;
            padding: 15px;
        }

        /* Summary Overlay */
        #summary-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .summary-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 400px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #374151;
            font-size: 1.2rem;
        }

        .stat-val { font-weight: 800; }

        .next-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1.2rem;
            width: 100%;
            border-radius: 0.75rem;
            font-size: 1.2rem;
            margin-top: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Skytte-träning</h1>
            
            <span class="selector-label">Välj avstånd</span>
            <div class="selector-group">
                <button class="option-btn dist-btn active" onclick="setDistance(0)">6m</button>
                <button class="option-btn dist-btn" onclick="setDistance(1)">7m</button>
                <button class="option-btn dist-btn" onclick="setDistance(2)">8m</button>
                <button class="option-btn dist-btn" onclick="setDistance(3)">9m</button>
            </div>

            <span class="selector-label">Antal skott</span>
            <div class="selector-group">
                <button class="option-btn count-btn" onclick="setTotalShots(20)">20</button>
                <button class="option-btn count-btn" onclick="setTotalShots(30)">30</button>
                <button class="option-btn count-btn" onclick="setTotalShots(40)">40</button>
                <button class="option-btn count-btn active" onclick="setTotalShots(50)">50</button>
            </div>

            <div class="current-distance" id="display-distance">6m</div>
        </header>

        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        
        <div class="counter">
            Skott: <span id="current-shot">1</span> / <span id="total-shot-display">50</span>
        </div>

        <div class="button-group">
            <button class="btn btn-miss" onclick="handleShot('miss')">Miss</button>
            <button class="btn btn-traff" onclick="handleShot('traff')">Träff</button>
            <button class="btn btn-stann" onclick="handleShot('stann')">Stann</button>
        </div>

        <div class="control-panel">
            <button class="reset-link" onclick="confirmReset()">Nollställ aktuellt resultat</button>
        </div>
    </div>

    <!-- Sammanfattning Overlay -->
    <div id="summary-overlay">
        <div class="summary-card">
            <h2 id="summary-title" style="margin-top: 0;">Resultat 6m</h2>
            <div class="stat-row">
                <span>Antal Missar:</span>
                <span class="stat-val" style="color: var(--color-miss)" id="res-miss">0</span>
            </div>
            <div class="stat-row">
                <span>Antal Träffar:</span>
                <span class="stat-val" style="color: var(--color-traff)" id="res-traff">0</span>
            </div>
            <div class="stat-row">
                <span>Antal Stann:</span>
                <span class="stat-val" style="color: var(--color-stann)" id="res-stann">0</span>
            </div>
            <div class="stat-row" style="border: none; margin-top: 10px; font-size: 1.4rem;">
                <span>Total Träff%:</span>
                <span class="stat-val" id="res-percent">0%</span>
            </div>
            <button class="next-btn" id="modal-btn" onclick="nextStep()">Nästa avstånd</button>
            <button class="reset-link" style="display: block; width: 100%; margin-top: 10px;" onclick="closeSummary()">Stäng</button>
        </div>
    </div>

    <script>
        const distances = [6, 7, 8, 9];
        let currentDistIdx = 0;
        let shotCount = 0;
        let shotsPerDistance = 50;

        let sessionStats = {
            miss: 0,
            traff: 0,
            stann: 0
        };

        function setDistance(idx) {
            if (shotCount > 0) {
                if (!confirm("Du har påbörjat en serie. Vill du byta avstånd och nollställa framstegen?")) {
                    return;
                }
            }
            currentDistIdx = idx;
            updateDistanceButtons();
            resetDistance();
        }

        function setTotalShots(count) {
            if (shotCount > 0) {
                if (!confirm("Du har påbörjat en serie. Vill du ändra antal skott och nollställa framstegen?")) {
                    return;
                }
            }
            shotsPerDistance = count;
            updateShotCountButtons();
            document.getElementById('total-shot-display').innerText = shotsPerDistance;
            resetDistance();
        }

        function updateDistanceButtons() {
            const btns = document.querySelectorAll('.dist-btn');
            btns.forEach((btn, i) => {
                if (i === currentDistIdx) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function updateShotCountButtons() {
            const btns = document.querySelectorAll('.count-btn');
            btns.forEach((btn) => {
                if (parseInt(btn.innerText) === shotsPerDistance) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function handleShot(type) {
            if (shotCount < shotsPerDistance) {
                sessionStats[type]++;
                shotCount++;
                updateUI();

                if (shotCount === shotsPerDistance) {
                    showSummary();
                }
            }
        }

        function updateUI() {
            document.getElementById('current-shot').innerText = Math.min(shotCount + 1, shotsPerDistance);
            const progress = (shotCount / shotsPerDistance) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }

        function showSummary() {
            document.getElementById('summary-title').innerText = `Resultat ${distances[currentDistIdx]}m (${shotsPerDistance} skott)`;
            document.getElementById('res-miss').innerText = sessionStats.miss;
            document.getElementById('res-traff').innerText = sessionStats.traff;
            document.getElementById('res-stann').innerText = sessionStats.stann;
            
            const hitRate = ((sessionStats.traff + sessionStats.stann) / shotsPerDistance * 100).toFixed(1);
            document.getElementById('res-percent').innerText = hitRate + '%';

            const btn = document.getElementById('modal-btn');
            if (currentDistIdx === distances.length - 1) {
                btn.innerText = "Börja om från 6m";
            } else {
                btn.innerText = "Nästa avstånd (" + distances[currentDistIdx + 1] + "m)";
            }

            document.getElementById('summary-overlay').style.display = 'flex';
        }

        function closeSummary() {
            document.getElementById('summary-overlay').style.display = 'none';
        }

        function nextStep() {
            if (currentDistIdx < distances.length - 1) {
                currentDistIdx++;
            } else {
                currentDistIdx = 0;
            }
            updateDistanceButtons();
            resetDistance();
            document.getElementById('summary-overlay').style.display = 'none';
        }

        function confirmReset() {
            if (confirm("Vill du nollställa resultatet för det här avståndet?")) {
                resetDistance();
            }
        }

        function resetDistance() {
            shotCount = 0;
            sessionStats = { miss: 0, traff: 0, stann: 0 };
            document.getElementById('display-distance').innerText = distances[currentDistIdx] + 'm';
            updateUI();
        }
    </script>
</body>
</html>
